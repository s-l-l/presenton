# Nginx 修正版（避免 /api/presentation_to_pptx_model 丢 query）
# 文件位置：docs/NGINX_PPT_API_FIX.conf

user  www www;
worker_processes auto;
error_log  /www/wwwlogs/nginx_error.log  crit;
pid        /www/server/nginx/logs/nginx.pid;
worker_rlimit_nofile 51200;

stream {
    log_format tcp_format '$time_local|$remote_addr|$protocol|$status|$bytes_sent|$bytes_received|$session_time|$upstream_addr|$upstream_bytes_sent|$upstream_bytes_received|$upstream_connect_time';

    access_log /www/wwwlogs/tcp-access.log tcp_format;
    error_log /www/wwwlogs/tcp-error.log;
    include /www/server/panel/vhost/nginx/tcp/*.conf;
}

events {
    use epoll;
    worker_connections 51200;
    multi_accept on;
}

http {
    include       mime.types;
    include proxy.conf;
    lua_package_path "/www/server/nginx/lib/lua/?.lua;;";

    default_type  application/octet-stream;

    server_names_hash_bucket_size 512;
    client_header_buffer_size 32k;
    large_client_header_buffers 4 32k;
    client_max_body_size 50m;

    sendfile   on;
    tcp_nopush on;
    keepalive_timeout 60;
    tcp_nodelay on;

    fastcgi_connect_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;
    fastcgi_buffer_size 64k;
    fastcgi_buffers 4 64k;
    fastcgi_busy_buffers_size 128k;
    fastcgi_temp_file_write_size 256k;
    fastcgi_intercept_errors on;

    gzip on;
    gzip_min_length  1k;
    gzip_buffers     4 16k;
    gzip_http_version 1.1;
    gzip_comp_level 5;
    gzip_types text/plain application/javascript application/x-javascript text/javascript text/css application/xml application/json image/jpeg image/gif image/png font/ttf font/otf image/svg+xml application/xml+rss text/x-js;
    gzip_vary on;
    gzip_proxied expired no-cache no-store private auth;
    gzip_disable "MSIE [1-6]\.";

    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn_zone $server_name zone=perserver:10m;

    server_tokens off;
    access_log off;

    server {
        listen 443 ssl;
        server_name ai.cqxqkj.com.cn;

        root /www/wwwroot/data_agent/web;
        index index.html index.htm;

        ssl_certificate     /www/server/panel/vhost/cert/ai.cqxqkj.com.cn/fullchain.pem;
        ssl_certificate_key /www/server/panel/vhost/cert/ai.cqxqkj.com.cn/privkey.pem;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        location ~ /\. {
            deny all;
        }

        # Presenton Next.js（挂到 /ppt）
        location ^~ /ppt/ {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /ppt {
            return 301 /ppt/deck-studio;
        }

        location ^~ /_next/ {
            proxy_pass http://127.0.0.1:3000/_next/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 关键修复：不要转到 /ppt/api；并强制保留 query 参数
        location ~ ^/api/(can-change-keys|user-config|telemetry-status|export-as-pdf|has-required-key|presentation_to_pptx_model|read-file|save-layout|template|templates|upload-image)$ {
            proxy_pass http://127.0.0.1:3000/api/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /Logo.png {
            return 301 /ppt/Logo.png;
        }

        # FastAPI
        location /api/v1/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_read_timeout 30m;
            proxy_connect_timeout 30m;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 其他 /api 走 data_agent
        location /api/ {
            proxy_pass http://127.0.0.1:8065;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /app_data/images/ {
            alias /www/wwwroot/presenton/app_data/images/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /app_data/exports/ {
            alias /www/wwwroot/presenton/app_data/exports/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /app_data/uploads/ {
            alias /www/wwwroot/presenton/app_data/uploads/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /app_data/fonts/ {
            alias /www/wwwroot/presenton/app_data/fonts/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* ^/([^/]+\.(gif|jpg|jpeg|png|bmp|svg|webp|ico))$ {
            return 301 /ppt/$1;
        }

        location ~* \.(gif|jpg|jpeg|png|bmp|swf|js|css|svg|ttf|woff|woff2)$ {
            expires 30d;
            access_log off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        access_log /www/wwwlogs/ai_access.log;
        error_log  /www/wwwlogs/ai_error.log;
    }

    server {
        listen 888;
        server_name phpmyadmin;
        index index.html index.htm index.php;
        root /www/server/phpmyadmin;
        include enable-php.conf;

        location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$ {
            expires 30d;
        }

        location ~ .*\.(js|css)?$ {
            expires 12h;
        }

        location ~ /\. {
            deny all;
        }

        access_log /www/wwwlogs/access.log;
    }

    include /www/server/panel/vhost/nginx/*.conf;
}
